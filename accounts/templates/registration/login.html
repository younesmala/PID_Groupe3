{% load i18n %}
<h1>{% trans "Connexion" %}</h1>

<form method="post">
  {% csrf_token %}

  {% if form.non_field_errors %}
    <div>
      {{ form.non_field_errors }}
    </div>
  {% endif %}

  <p>
    <label for="id_username">{% trans "Nom d’utilisateur" %}</label>
    <input
      type="text"
      name="username"
      id="id_username"
      value="{{ form.username.value|default:'' }}"
      autocomplete="username"
      required
    >
    {{ form.username.errors }}
  </p>

  <p>
    <label for="id_password">{% trans "Mot de passe" %}</label>
    <input
      type="password"
      name="password"
      id="id_password"
      autocomplete="current-password"
      required
    >
    {{ form.password.errors }}
  </p>

  {% if next %}
    <input type="hidden" name="next" value="{{ next }}">
  {% endif %}

  <button type="submit">{% trans "Se connecter" %}</button>
</form>

<p>
  {% trans "Pas encore de compte ?" %}
  <a href="{% url 'accounts:user-signup' %}">{% trans "S'inscrire" %}</a>
</p>
