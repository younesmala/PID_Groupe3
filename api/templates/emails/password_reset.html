<!DOCTYPE html>
<html lang="{{ lang }}">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <title>{{ subject }}</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      background-color: #0f172a;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    }
    .wrapper {
      width: 100%;
      background-color: #0f172a;
      padding: 40px 16px;
    }
    .card {
      max-width: 560px;
      margin: 0 auto;
      background-color: #f8fafc;
      border-radius: 16px;
      overflow: hidden;
    }
    .header {
      background: linear-gradient(135deg, #12345a 0%, #1d4f6b 100%);
      padding: 32px 40px;
      text-align: center;
    }
    .brand {
      font-size: 22px;
      font-weight: 700;
      color: #ffffff;
      letter-spacing: -0.3px;
    }
    .brand-dot {
      color: #ea580c;
    }
    .body {
      padding: 36px 40px;
      color: #0b1220;
    }
    .greeting {
      font-size: 18px;
      font-weight: 600;
      margin: 0 0 16px;
      color: #0b1220;
    }
    .text {
      font-size: 15px;
      line-height: 1.6;
      color: #475569;
      margin: 0 0 24px;
    }
    .btn-wrap {
      text-align: center;
      margin: 32px 0;
    }
    .btn {
      display: inline-block;
      background-color: #ea580c;
      color: #ffffff !important;
      text-decoration: none;
      font-size: 16px;
      font-weight: 600;
      padding: 14px 36px;
      border-radius: 10px;
    }
    .divider {
      border: none;
      border-top: 1px solid #e2e8f0;
      margin: 28px 0;
    }
    .fallback-label {
      font-size: 12px;
      color: #94a3b8;
      margin: 0 0 6px;
    }
    .fallback-url {
      font-size: 12px;
      color: #ea580c;
      word-break: break-all;
    }
    .expiry {
      font-size: 13px;
      color: #94a3b8;
      margin: 24px 0 0;
    }
    .footer {
      background-color: #f1f5f9;
      padding: 20px 40px;
      text-align: center;
      font-size: 12px;
      color: #94a3b8;
      line-height: 1.5;
    }
  </style>
</head>
<body>
  <div class="wrapper">
    <div class="card">

      <!-- En-tête -->
      <div class="header">
        <div class="brand">Brussels<span class="brand-dot">.</span>Show</div>
      </div>

      <!-- Corps -->
      <div class="body">
        <p class="greeting">{{ greeting }}</p>
        <p class="text">{{ intro }}</p>

        <div class="btn-wrap">
          <a href="{{ reset_url }}" class="btn">{{ btn_label }}</a>
        </div>

        <p class="text">{{ fallback_intro }}</p>

        <hr class="divider" />

        <p class="fallback-label">{{ fallback_label }}</p>
        <p class="fallback-url">{{ reset_url }}</p>

        <p class="expiry">⏱ {{ expiry }}</p>
        <p class="expiry">{{ no_request }}</p>
      </div>

      <!-- Pied de page -->
      <div class="footer">
        &copy; 2026 Brussels Show &mdash; {{ footer_note }}
      </div>

    </div>
  </div>
</body>
</html>
