{%extends 'layouts/base.html'%}
{% load i18n %}

{%block title %}{% trans "Ajouter un artiste" %}{% endblock %}

{% block content %}
    <H2>{% trans "Ajouter un artiste" %}</H2>
    <form action="{%url 'catalogue:artist-create' %}" method="post">
        {% csrf_token %}

        <div class="form-group">
            <label for="{{ form.firstname.id_for_label }}">{% trans "Prénom" %}</label>
            <input class="form-input"
                   type="text"
                   name="{{ form.firstname.html_name }}"
                   id="{{ form.firstname.id_for_label }}"
                   value="{{ form.firstname.value|default:'' }}">
        </div>

        <div class="form-group">
            <label for="{{ form.lastname.id_for_label }}">{% trans "Nom" %}</label>
            <input class="form-input"
                   type="text"
                   name="{{ form.lastname.html_name }}"
                   id="{{ form.lastname.id_for_label }}"
                   value="{{ form.lastname.value|default:'' }}">
        </div>

        <button class="btn btn-primary">{% trans "Ajouter" %}</button>
        <a class="btn" href="{%url 'catalogue:artist-index' %}">{% trans "Annuler" %}</a>

    </form>
    <nav><a href="{%url 'catalogue:artist-index' %}">{% trans "Retour à la l'index" %}</a></nav>
{% endblock %}
