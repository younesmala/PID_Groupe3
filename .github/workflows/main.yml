name: Django CI

on:
  push:
    branches: [ main, dev_* ]
  pull_request:
    branches: [ main ]

jobs:

  # ── 1. Linting Python ──────────────────────────────────────────────────────
  lint:
    name: Python Lint (flake8)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install flake8
        run: pip install flake8

      # E501 = line too long (toléré à 120 car Django génère parfois des longues lignes)
      # migrations/ exclues car générées automatiquement
      - name: Run flake8
        run: |
          flake8 . \
            --count \
            --max-line-length=120 \
            --exclude=env,node_modules,migrations,__pycache__ \
            --show-source \
            --statistics

  # ── 2. Tests Django + MySQL 8.0 ────────────────────────────────────────────
  test:
    name: Django Tests (MySQL 8.0)
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: test_db
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run migrations
        env:
          DB_NAME: test_db
          DB_USER: root
          DB_PASSWORD: root
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          SECRET_KEY: test-secret-key-for-ci
          DEBUG: "False"
        run: python manage.py migrate

      - name: Run tests
        env:
          DB_NAME: test_db
          DB_USER: root
          DB_PASSWORD: root
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          SECRET_KEY: test-secret-key-for-ci
          DEBUG: "False"
        run: python manage.py test accounts catalogue

  # ── 3. Build Frontend React (Vite) ─────────────────────────────────────────
  frontend:
    name: Frontend React (npm install + build)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        working-directory: ./frontend
        run: npm install

      - name: Build
        working-directory: ./frontend
        run: npm run build
